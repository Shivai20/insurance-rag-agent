services:
  postgres:
    image: postgres:16
    container_name: acme-postgres
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
      POSTGRES_DB: acme
    ports:
      - "5432:5432"
    volumes:
      - acme_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  acme_pgdata:
